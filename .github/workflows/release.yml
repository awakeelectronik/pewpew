name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install ARM64 cross-compiler (CGO)
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build frontend
        run: |
          cd web && npm ci && npm run build

      - name: Prepare static embed
        run: rm -rf static/dist && cp -r web/dist static/

      - name: Build linux-amd64
        run: go build -ldflags="-s -w" -o pewpew-linux-amd64 ./cmd/pewpew

      - name: Build linux-arm64
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm64
          CC: aarch64-linux-gnu-gcc
        run: go build -ldflags="-s -w" -o pewpew-linux-arm64 ./cmd/pewpew

      - name: Checksums
        run: sha256sum pewpew-linux-amd64 pewpew-linux-arm64 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pewpew-linux-amd64
            pewpew-linux-arm64
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
